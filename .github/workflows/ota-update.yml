# OTA-обновление JS/asset-слоя через EAS Update (канал production). Срабатывает на push в main и
# вручную. Перед публикацией — fingerprint-guard: отпечаток текущего main сравнивается с fingerprint
# последнего APK-релиза. Различие = нативный слой изменился → OTA не доедет до установленного билда →
# fail с просьбой выпустить новый APK-релиз. Совпадение → eas update в ветку production.
#
# Back-merge из release-android.yml идёт под GITHUB_TOKEN и workflow НЕ ре-триггерит, поэтому OTA не
# запускается на каждый релизный back-merge — только на обычные мержи фич в main.
name: OTA Update

on:
  workflow_dispatch:
  push:
    branches:
      - main

# contents: read — скачать fingerprint последнего Release через gh.
permissions:
  contents: read

# Параллельные публикации в production не запускаем.
concurrency:
  group: ota-production
  cancel-in-progress: false

jobs:
  ota:
    name: Publish OTA (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fingerprint текущего дерева — ТЕМ ЖЕ способом, что в релизной сборке (чистое дерево, до prebuild).
      # fingerprint.config.js делает hash независимым от версии/канала → он меняется только при изменении
      # нативного слоя (зависимости, плагины, конфиг, нативные файлы), но не от правок JS/ассетов.
      - name: Compute current fingerprint
        id: fp
        run: |
          CURRENT=$(npx expo-updates fingerprint:generate --platform android 2>/dev/null | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>process.stdout.write(JSON.parse(d).hash))")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Текущий fingerprint: $CURRENT"

      # Fingerprint последнего APK-релиза (ассет onsite-v<версия>.fingerprint.txt).
      - name: Fetch latest release fingerprint
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --pattern '*.fingerprint.txt' --dir release-fp --repo "$GITHUB_REPOSITORY" || true
          RELEASE=$(cat release-fp/*.fingerprint.txt 2>/dev/null || true)
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "Fingerprint последнего релиза: ${RELEASE:-<нет>}"

      # Guard совместимости runtimeVersion. Различие → нативка изменилась, OTA не доедет.
      - name: Fingerprint guard
        env:
          CURRENT: ${{ steps.fp.outputs.current }}
          RELEASE: ${{ steps.rel.outputs.release }}
        run: |
          if [ -z "$RELEASE" ]; then
            echo "::error::Не найден fingerprint последнего релиза — сначала выпустите APK (мерж main→release)."
            exit 1
          fi
          if [ "$CURRENT" != "$RELEASE" ]; then
            echo "::error::Нативный слой изменился (fingerprint $CURRENT != релиз $RELEASE). OTA не доедет — нужен новый APK-релиз (мерж main->release)."
            exit 1
          fi
          echo "Fingerprint совпал ($CURRENT) — OTA совместима с последним релизом."

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Канал production маппится на ветку production (см. eas channel:list). Сообщение берём из коммита
      # через env (без подстановки в команду — защита от инъекции), с фолбэком для ручного запуска.
      # --platform android: релиз «Пути A» — Android APK; web-бандл (expo-sqlite wasm) для OTA не нужен
      # и не собирается. --non-interactive eas update не поддерживает (CI=true на раннере уже неинтерактив).
      - name: Publish OTA update (branch production)
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: eas update --branch production --platform android --message "${MSG:-Manual OTA dispatch ($GITHUB_SHA)}"
