# Переиспользуемый quality-гейт: lint + typecheck + format:check + test.
# Вызывается из ci.yml (PR + push develop) и release.yml (push main) через `uses:`.
name: Quality

on:
  workflow_call:

# Шаги только читают репозиторий и зависимости (npm ci/lint/typecheck/test) — пишущий доступ не нужен.
# Вызывается из release.yml, где у workflow есть contents:write — без явного read здесь job
# по умолчанию унаследовал бы write-токен.
permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, format, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Раздельные шаги — статус каждого гейта виден отдельно в Actions UI.
      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Test (jest-expo)
        run: npm test
