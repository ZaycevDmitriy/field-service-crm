# Релиз устанавливаемого Android APK по git-тегу v* (Путь A: нативный Gradle на раннере GitHub,
# без EAS-кредитов и секретов). quality-гейт переиспользуется; сборка идёт только если quality прошёл.
name: Release Android

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Параллельные релизы одного тега не запускаем; идущую сборку не отменяем.
concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Quality
    uses: ./.github/workflows/quality.yml

  build:
    name: Build & release APK
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # CNG: каталог android/ в .gitignore → генерируем нативный проект на раннере.
      # Шаблон Expo кладёт детерминированный debug.keystore; release-buildType подписывается им
      # (signingConfigs.debug) → нулевые секреты и стабильная подпись между сборками.
      # Android SDK предустановлен на ubuntu-latest; setup-android добавлять только при нехватке build-tools.
      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # KSP (:expo-updates:kspReleaseKotlin) исчерпывает дефолтный Metaspace из шаблона prebuild
      # на раннере → OutOfMemoryError: Metaspace. Поднимаем лимиты Gradle- и Kotlin-демонов.
      # Дубль ключа в .properties → java.util.Properties берёт последнее значение (наше).
      - name: Bump Gradle/Kotlin memory (KSP Metaspace)
        run: |
          {
            echo ""
            echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=2048m -Dfile.encoding=UTF-8"
            echo "kotlin.daemon.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=1024m"
          } >> android/gradle.properties

      - name: Build release APK (assembleRelease)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK to onsite-<tag>.apk
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/onsite-${GITHUB_REF_NAME}.apk"
          echo "Собран APK: dist/onsite-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
