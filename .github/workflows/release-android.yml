# Релиз по ветке `release` (Путь A: нативный Gradle на раннере GitHub, без EAS-кредитов и секретов).
# Момент релиза контролируется вручную — мержем main→release (PR). Дальше semantic-release сам считает
# версию из Conventional Commits, ведёт CHANGELOG, собирает APK (exec prepareCmd → scripts/release/
# build-android.sh) и публикует GitHub Release с APK + fingerprint. quality-гейт переиспользуется;
# релиз идёт только если quality прошёл.
name: Release

on:
  push:
    branches:
      - release

# contents: тег/Release/пуш CHANGELOG и back-merge; issues/PR — комментарии semantic-release к связанным PR.
permissions:
  contents: write
  issues: write
  pull-requests: write

# Параллельные релизы с ветки release не запускаем; идущий релиз не отменяем.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Quality
    uses: ./.github/workflows/quality.yml

  release:
    name: Release (semantic-release + APK)
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # semantic-release анализирует всю историю коммитов и теги — мелкий клон ломает расчёт версии.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Java/Gradle нужны exec-шагу semantic-release: он гонит prebuild + assembleRelease на раннере.
      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Версия, CHANGELOG, сборка APK и GitHub Release — всё по .releaserc.json. Токен по умолчанию
      # не ре-триггерит workflow (пуш CHANGELOG в release петлю не создаёт), плюс [skip ci] в коммите бота.
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # После релиза возвращаем CHANGELOG-коммит (и тег-историю) с release обратно в main, чтобы ветки
  # не расходились. Прямой push под GITHUB_TOKEN работает при отсутствии branch protection на main;
  # если main защищён правилом «только через PR» — заменить на создание PR. Пуш токеном workflow
  # не ре-триггерит (петли нет); ota-update.yml (push:main) появляется в Фазе 5.
  backmerge:
    name: Back-merge release → main
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Merge release into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin release
          echo "Back-merge origin/release → main"
          git merge --no-edit origin/release
          git push origin main
