# Quality-CI на каждый PR и push в main. Тяжёлая Android-сборка — отдельно в release-android.yml (по тегу).
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Новый push в ту же ветку/PR отменяет предыдущий незавершённый прогон.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    uses: ./.github/workflows/quality.yml
