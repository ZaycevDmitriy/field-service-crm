# Quality-CI на каждый PR и push в develop. Релиз (semantic-release + доставка OTA/APK) — отдельно
# в release.yml (push main).
name: CI

on:
  pull_request:
  push:
    branches: [develop]

# Оба job только читают репозиторий (checkout + lint/typecheck/test, actionlint) — write не нужен.
permissions:
  contents: read

# Новый push в ту же ветку/PR отменяет предыдущий незавершённый прогон.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    # timeout-minutes недопустим у job, вызывающего reusable workflow через uses (только
    # name/uses/with/secrets/needs/if/permissions) — таймаут уже на самой job внутри quality.yml.
    uses: ./.github/workflows/quality.yml

  actionlint:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Бинарь actionlint и его версия запинены детерминированно (скрипт по тегу + версия аргументом).
      # actionlint сам прогоняет shellcheck по всем `run:`-блокам (shellcheck предустановлен на ubuntu-latest).
      - name: Run actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash -o download-actionlint.bash
          bash download-actionlint.bash 1.7.12
          ./actionlint -color
